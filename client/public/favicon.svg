<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark blue background for contrast -->
  <rect width="100" height="100" fill="#1a73e8"/>
  
  <!-- Left brain hemisphere - light blue -->
  <circle cx="32" cy="38" r="8" fill="#d4e9ff" stroke="#e8f0fe" stroke-width="0.5"/>
  <circle cx="28" cy="50" r="7" fill="#e8f0fe" stroke="#d4e9ff" stroke-width="0.5"/>
  <circle cx="32" cy="62" r="6" fill="#d4e9ff" stroke="#e8f0fe" stroke-width="0.5"/>
  
  <!-- Right brain hemisphere - light blue -->
  <circle cx="68" cy="38" r="8" fill="#d4e9ff" stroke="#e8f0fe" stroke-width="0.5"/>
  <circle cx="72" cy="50" r="7" fill="#e8f0fe" stroke="#d4e9ff" stroke-width="0.5"/>
  <circle cx="68" cy="62" r="6" fill="#d4e9ff" stroke="#e8f0fe" stroke-width="0.5"/>
  
  <!-- Central processor - light yellow -->
  <circle cx="50" cy="50" r="5" fill="#fff8dc" stroke="#fbbc04" stroke-width="1"/>
  
  <!-- Connection lines - light green -->
  <g stroke="#34a853" stroke-width="1.5" stroke-linecap="round" fill="none">
    <line x1="41" y1="50" x2="59" y2="50"/>
    <line x1="40" y1="45" x2="60" y2="45"/>
    <line x1="40" y1="55" x2="60" y2="55"/>
  </g>
  
  <!-- Upward arrow for growth - light green -->
  <g fill="none" stroke="#34a853" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="50" y1="73" x2="50" y2="82"/>
    <polyline points="50,82 46,77 50,82 54,77" fill="#34a853"/>
  </g>
</svg>
